services:
  mcce-api:
    build:
      context: ./backend
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}
      MCCE_ALLOWED_ORIGIN_PATTERNS: ${MCCE_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}
      EXECUTION_STRATEGY: ${EXECUTION_STRATEGY:-DOCKER}
      MCCE_EXECUTION_TIMEOUT: ${MCCE_EXECUTION_TIMEOUT:-5s}
      MCCE_EXECUTION_MEMORY_LIMIT: ${MCCE_EXECUTION_MEMORY_LIMIT:-256MB}
      MCCE_EXECUTION_WORKSPACE_DIR: ${MCCE_EXECUTION_WORKSPACE_DIR:-/workspace}
      MCCE_EXECUTION_NETWORK_MODE: ${MCCE_EXECUTION_NETWORK_MODE:-none}
      MCCE_EXECUTION_READONLY_ROOTFS: ${MCCE_EXECUTION_READONLY_ROOTFS:-true}
      MCCE_EXECUTION_IMAGE_JAVA: ${MCCE_EXECUTION_IMAGE_JAVA:-eclipse-temurin:17-jdk}
      MCCE_EXECUTION_IMAGE_PYTHON: ${MCCE_EXECUTION_IMAGE_PYTHON:-python:3.12-alpine}
      MCCE_EXECUTION_IMAGE_CPP: ${MCCE_EXECUTION_IMAGE_CPP:-gcc:14}
      MCCE_EXECUTION_IMAGE_JAVASCRIPT: ${MCCE_EXECUTION_IMAGE_JAVASCRIPT:-node:20-alpine}
      MCCE_EXECUTION_PISTON_URL: ${MCCE_EXECUTION_PISTON_URL:-https://emkc.org/api/v2/piston/execute}
      MCCE_EXECUTION_PISTON_RUNTIMES_URL: ${MCCE_EXECUTION_PISTON_RUNTIMES_URL:-https://emkc.org/api/v2/piston/runtimes}
      MCCE_EXECUTION_PISTON_VERSION: ${MCCE_EXECUTION_PISTON_VERSION:-*}
      MCCE_EXECUTION_PISTON_RUN_TIMEOUT_MS: ${MCCE_EXECUTION_PISTON_RUN_TIMEOUT_MS:-5000}
      MCCE_EXECUTION_PISTON_COMPILE_TIMEOUT_MS: ${MCCE_EXECUTION_PISTON_COMPILE_TIMEOUT_MS:-5000}
    volumes:
      - mcce_tmp:/var/mcce/tmp
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data

volumes:
  mcce_tmp:
