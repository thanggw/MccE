spring.application.name=mcce-backend
server.port=${PORT:${SERVER_PORT:8080}}
#spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
#spring.data.redis.port=${SPRING_REDIS_PORT:6379}
#spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${SPRING_REDIS_SSL:false}
spring.data.redis.url=${SPRING_REDIS_URL:redis://localhost:6379}
mcce.cors.allowed-origin-patterns=${MCCE_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
mcce.execution.strategy=${EXECUTION_STRATEGY:DOCKER}
mcce.execution.timeout=${MCCE_EXECUTION_TIMEOUT:5s}
mcce.execution.memory-limit=${MCCE_EXECUTION_MEMORY_LIMIT:256MB}
mcce.execution.workspace-dir=${MCCE_EXECUTION_WORKSPACE_DIR:/workspace}
mcce.execution.network-mode=${MCCE_EXECUTION_NETWORK_MODE:none}
mcce.execution.readonly-rootfs=${MCCE_EXECUTION_READONLY_ROOTFS:true}
mcce.execution.docker-host=${MCCE_EXECUTION_DOCKER_HOST:}
mcce.execution.images.java=${MCCE_EXECUTION_IMAGE_JAVA:eclipse-temurin:17-jdk}
mcce.execution.images.python=${MCCE_EXECUTION_IMAGE_PYTHON:python:3.12-alpine}
mcce.execution.images.cpp=${MCCE_EXECUTION_IMAGE_CPP:gcc:14}
mcce.execution.images.javascript=${MCCE_EXECUTION_IMAGE_JAVASCRIPT:node:20-alpine}
mcce.execution.judge0.url=${MCCE_EXECUTION_JUDGE0_URL:${MCCE_EXECUTION_PISTON_URL:https://ce.judge0.com/submissions?base64_encoded=false&wait=true}}
mcce.execution.judge0.timeout-ms=${MCCE_EXECUTION_JUDGE0_TIMEOUT_MS:${MCCE_EXECUTION_PISTON_RUN_TIMEOUT_MS:10000}}
